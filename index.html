<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA: 添加到手机桌面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="任务看板">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<link rel="apple-touch-icon" href="/taskboard/icon-192.png">
<link rel="manifest" href="/taskboard/manifest.json">
<title>📋 任务看板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: #f5f0e8;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,217,102,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(129,199,132,0.12) 0%, transparent 50%);
    padding: 30px 20px;
    /* 拖拽时禁止选中文字 */
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── 顶部 ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    color: #4a4a4a;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .add-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .add-bar input {
    width: 420px;
    max-width: 80vw;
    padding: 12px 18px;
    font-size: 16px;
    border: 2px solid #e0d8cc;
    border-radius: 12px;
    outline: none;
    background: #fffef9;
    transition: border 0.2s;
    font-family: inherit;
    -webkit-user-select: text;
    user-select: text;
  }
  .add-bar input:focus {
    border-color: #ffb74d;
    box-shadow: 0 0 0 4px rgba(255,183,77,0.12);
  }
  .add-bar button {
    padding: 12px 26px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #ffb74d;
    color: #fff;
    transition: all 0.2s;
    font-family: inherit;
    -webkit-user-select: none;
    user-select: none;
  }
  .add-bar button:hover {
    background: #ffa726;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255,167,38,0.3);
  }

  /* ── 双栏布局 ── */
  .board {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
    align-items: flex-start;
  }

  @media (max-width: 750px) {
    .board {
      flex-direction: column;
      align-items: stretch;
    }
  }

  /* ── 便签面板 ── */
  .panel {
    flex: 1;
    min-width: 280px;
    border-radius: 6px 6px 16px 6px;
    box-shadow: 4px 5px 20px rgba(0,0,0,0.1), 1px 1px 3px rgba(0,0,0,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }

  .panel-head {
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .count {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.7;
  }

  /* 待完成 — 暖黄调 */
  .panel-active {
    background: #fffef7;
    border: 1px solid #ede7d5;
  }
  .panel-active .panel-head {
    background: #fff8e1;
    color: #6d5b2e;
    border-bottom: 1px solid #f0e4c6;
  }

  /* 已完成 — 浅绿调 */
  .panel-done {
    background: #fafff7;
    border: 1px solid #dce8d5;
  }
  .panel-done .panel-head {
    background: #e8f5e9;
    color: #3e5c3a;
    border-bottom: 1px solid #d0e2cc;
  }

  .panel-body {
    padding: 12px 14px;
    flex: 1;
    min-height: 200px;
  }

  /* ── 空状态 ── */
  .empty-hint {
    text-align: center;
    color: #ccc;
    padding: 40px 10px;
    font-size: 14px;
  }

  /* ── 任务行 ── */
  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    transition: all 0.25s;
    animation: slideIn 0.3s ease;
    cursor: grab;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none; /* 防止移动端页面滚动干扰 */
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-row:hover {
    background: rgba(255,255,255,0.95);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .task-num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f5f0e8;
    color: #999;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    color: #444;
    line-height: 1.5;
    word-break: break-word;
    pointer-events: none;
  }
  .panel-done .task-text {
    text-decoration: line-through;
    color: #aaa;
  }

  /* 按钮 */
  .task-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: #fff;
    /* 按钮恢复可交互 */
    pointer-events: auto;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn-done {
    color: #bbb;
    border-color: #e0d8cc;
  }
  .btn-done:hover {
    background: #43a047;
    color: #fff;
    border-color: #43a047;
    transform: scale(1.08);
    box-shadow: 0 3px 10px rgba(67,160,71,0.3);
  }

  .btn-restore {
    color: #bbb;
    border-color: #e0d8cc;
  }
  .btn-restore:hover {
    background: #ffb74d;
    color: #fff;
    border-color: #ffb74d;
    transform: scale(1.08);
    box-shadow: 0 3px 10px rgba(255,183,77,0.3);
  }

  .btn-delete {
    color: #bbb;
    border-color: transparent;
    font-size: 14px;
  }
  .btn-delete:hover {
    background: #ef5350;
    color: #fff;
    border-color: #ef5350;
    transform: scale(1.08);
  }

  /* ── 拖拽排序视觉 ── */
  body.is-dragging .task-row {
    cursor: grabbing;
  }
  .task-row.dragging {
    opacity: 0.4;
    background: rgba(255,255,255,0.4);
    box-shadow: inset 3px 0 0 #ffb74d;
  }
  .task-row.drag-over {
    border: 2px dashed #ffb74d;
    background: rgba(255,183,77,0.12);
    transform: scale(1.02);
  }
  .drag-clone {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.93;
    transform: rotate(1.5deg) scale(1.03);
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    border-radius: 10px;
    background: #fffef7;
  }
  .longpress-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 9998;
    animation: fadeInOut 2s ease forwards;
    pointer-events: none;
  }
  @keyframes fadeInOut {
    0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes slideDown {
    from { transform: translateY(-100%); }
    to   { transform: translateY(0); }
  }

  /* ── 底部工具栏 ── */
  .footer-bar {
    text-align: center;
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .footer-bar button {
    padding: 10px 20px;
    font-size: 13px;
    border-radius: 20px;
    border: 1px solid #ddd;
    cursor: pointer;
    background: #fff;
    color: #888;
    transition: all 0.2s;
    font-family: inherit;
  }
  .footer-bar button:hover {
    background: #fafafa;
    color: #555;
    border-color: #bbb;
  }
  .footer-bar .btn-danger:hover {
    background: #fff5f5;
    color: #ef5350;
    border-color: #ef5350;
  }

  /* ── 进度条 ── */
  .progress-wrap {
    max-width: 1100px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 4px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #e8e0d5;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #66bb6a;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    color: #999;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 任务看板</h1>
  <!-- 安装到桌面按钮 -->
  <div id="installBox" style="margin-top:12px;display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:20px;padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;font-size:14px;color:#555;" onclick="installOrGuide()">
    <span style="font-size:18px;">📲</span>
    <span id="installBoxText">添加到手机桌面</span>
  </div>
  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="输入新任务，按 Enter 添加…" maxlength="200">
    <button onclick="addTask()">＋ 添加</button>
  </div>
</div>

<div class="progress-wrap" id="progressArea">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-label" id="progressLabel">0/0</span>
</div>

<div class="board">
  <!-- 待完成 -->
  <div class="panel panel-active">
    <div class="panel-head">📝 待完成 <span class="count" id="activeCount">0</span></div>
    <div class="panel-body" id="activeList"></div>
  </div>

  <!-- 已完成 -->
  <div class="panel panel-done">
    <div class="panel-head">✅ 已完成 <span class="count" id="doneCount">0</span></div>
    <div class="panel-body" id="doneList"></div>
  </div>
</div>

<div class="footer-bar">
  <button onclick="exportTasks()">📥 导出备份</button>
  <button onclick="importTasks()">📤 导入恢复</button>
  <button class="btn-danger" onclick="clearDone()">🗑 清空已完成</button>
  <button class="btn-danger" onclick="clearAllTasks()">⚠ 全部清空</button>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const STORAGE_KEY = 'task_board_v2';

let tasks = [];

// ========== 存储 ==========
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tasks = JSON.parse(raw);
  } catch(e) { tasks = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ========== 渲染 ==========
function renderAll() {
  const active = tasks.filter(t => !t.completed);
  const done   = tasks.filter(t =>  t.completed);

  // 待完成列表
  const activeList = document.getElementById('activeList');
  if (active.length === 0) {
    activeList.innerHTML = '<div class="empty-hint">✨ 还没有任务<br>在上方输入框写下第一个任务吧</div>';
  } else {
    activeList.innerHTML = active.map((t, i) => `
      <div class="task-row" data-id="${t.id}"
           onmousedown="onRowDown(event,this)"
           ontouchstart="onRowTouchStart(event,this)"
           ontouchmove="onRowTouchMove(event,this)"
           ontouchend="onRowTouchEnd(event,this)">
        <span class="task-num">${i + 1}</span>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <button class="task-btn btn-done" title="标记完成" onclick="completeTask(${t.id})">✓</button>
        <button class="task-btn btn-delete" title="删除任务" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // 已完成列表
  const doneList = document.getElementById('doneList');
  if (done.length === 0) {
    doneList.innerHTML = '<div class="empty-hint">📭 还没有已完成的任务</div>';
  } else {
    doneList.innerHTML = done.map(t => `
      <div class="task-row" data-id="${t.id}">
        <span class="task-num" style="background:#e8f5e9;color:#81c784;">✓</span>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <button class="task-btn btn-restore" title="恢复任务" onclick="restoreTask(${t.id})">↩</button>
        <button class="task-btn btn-delete" title="删除" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // 计数
  document.getElementById('activeCount').textContent = active.length;
  document.getElementById('doneCount').textContent = done.length;

  // 进度条
  const total = tasks.length;
  const pct = total === 0 ? 0 : Math.round((done.length / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done.length}/${total} · ${pct}%`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 操作 ==========
function addTask(text) {
  if (!text) {
    text = document.getElementById('taskInput').value.trim();
  }
  if (!text) {
    document.getElementById('taskInput').focus();
    return;
  }

  tasks.push({
    id: Date.now(),
    text: text,
    completed: false,
    createdAt: Date.now(),
    completedAt: null
  });

  document.getElementById('taskInput').value = '';
  document.getElementById('taskInput').focus();
  save();
  renderAll();
}

function completeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = true;
  task.completedAt = Date.now();
  save();
  renderAll();
}

function restoreTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = false;
  task.completedAt = null;
  save();
  renderAll();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderAll();
}

function clearDone() {
  const done = tasks.filter(t => t.completed);
  if (done.length === 0) return;
  if (!confirm(`确定要删除全部 ${done.length} 条已完成任务吗？`)) return;
  tasks = tasks.filter(t => !t.completed);
  save();
  renderAll();
}

function clearAllTasks() {
  if (tasks.length === 0) return;
  if (!confirm(`确定要删除全部 ${tasks.length} 条任务吗？此操作不可恢复！`)) return;
  tasks = [];
  save();
  renderAll();
}

// ========== 自定义拖拽排序（桌面鼠标 + 移动端触屏统一） ==========
let drag = null; // { id, el, clone, startX, startY, offX, offY, active }

// ── 桌面鼠标拖拽 ──
function onRowDown(e, el) {
  // 不拦截按钮点击
  if (e.target.tagName === 'BUTTON') return;
  if (e.button !== 0) return; // 只响应左键
  e.preventDefault();

  const rect = el.getBoundingClientRect();
  drag = {
    id: parseInt(el.dataset.id),
    el: el,
    clone: null,
    startX: e.clientX,
    startY: e.clientY,
    offX: e.clientX - rect.left,
    offY: e.clientY - rect.top,
    active: false
  };
}

function onRowTouchStart(e, el) {
  if (e.target.tagName === 'BUTTON') return;
  const touch = e.touches[0];
  const rect = el.getBoundingClientRect();
  drag = {
    id: parseInt(el.dataset.id),
    el: el,
    clone: null,
    startX: touch.clientX,
    startY: touch.clientY,
    offX: touch.clientX - rect.left,
    offY: touch.clientY - rect.top,
    active: false,
    touchTimer: setTimeout(function() {
      activateDrag(touch.clientX, touch.clientY);
    }, 500)
  };
}

function onRowTouchMove(e, el) {
  if (!drag) return;
  const touch = e.touches[0];

  // 未激活时，移动超过阈值则取消长按
  if (!drag.active) {
    if (drag.touchTimer && (Math.abs(touch.clientX - drag.startX) > 8 || Math.abs(touch.clientY - drag.startY) > 8)) {
      clearTimeout(drag.touchTimer);
      drag = null;
    }
    return;
  }

  e.preventDefault();
  moveDrag(touch.clientX, touch.clientY);
}

function onRowTouchEnd(e, el) {
  if (!drag) return;
  if (drag.touchTimer) clearTimeout(drag.touchTimer);
  if (!drag.active) { drag = null; return; }

  const touch = e.changedTouches[0];
  finishDrag(touch.clientX, touch.clientY);
}

// ── 全局鼠标移动 ──
document.addEventListener('mousemove', function(e) {
  if (!drag) return;

  // 激活阈值
  if (!drag.active) {
    if (Math.abs(e.clientX - drag.startX) < 5 && Math.abs(e.clientY - drag.startY) < 5) return;
    activateDrag(e.clientX, e.clientY);
  }

  moveDrag(e.clientX, e.clientY);
});

// ── 全局鼠标松开 ──
document.addEventListener('mouseup', function(e) {
  if (!drag) return;
  if (!drag.active) { drag = null; return; }
  finishDrag(e.clientX, e.clientY);
});

// ── 激活拖拽（创建浮动克隆） ──
function activateDrag(cx, cy) {
  drag.active = true;
  document.body.classList.add('is-dragging');

  var clone = drag.el.cloneNode(true);
  clone.classList.add('drag-clone');
  clone.style.width = drag.el.offsetWidth + 'px';
  clone.style.left = (cx - drag.offX) + 'px';
  clone.style.top = (cy - drag.offY) + 'px';
  document.body.appendChild(clone);
  drag.clone = clone;

  drag.el.classList.add('dragging');
}

// ── 移动拖拽 ──
function moveDrag(cx, cy) {
  drag.clone.style.left = (cx - drag.offX) + 'px';
  drag.clone.style.top = (cy - drag.offY) + 'px';

  // 隐藏克隆后探测下方元素
  drag.clone.style.display = 'none';
  var elemBelow = document.elementFromPoint(cx, cy);
  drag.clone.style.display = '';

  // 高亮目标行
  document.querySelectorAll('.task-row.drag-over').forEach(function(r) { r.classList.remove('drag-over'); });
  var rowBelow = elemBelow ? elemBelow.closest('.task-row') : null;
  if (rowBelow && rowBelow.dataset.id && parseInt(rowBelow.dataset.id) !== drag.id) {
    rowBelow.classList.add('drag-over');
  }
}

// ── 结束拖拽 ──
function finishDrag(cx, cy) {
  if (drag.clone) {
    drag.clone.remove();
    drag.clone = null;
  }

  drag.el.classList.remove('dragging');
  document.body.classList.remove('is-dragging');
  document.querySelectorAll('.task-row.drag-over').forEach(function(r) { r.classList.remove('drag-over'); });

  // 探测落点
  var elemBelow = document.elementFromPoint(cx, cy);
  var rowBelow = elemBelow ? elemBelow.closest('.task-row') : null;

  if (rowBelow && rowBelow.dataset.id && parseInt(rowBelow.dataset.id) !== drag.id) {
    reorderTasks(drag.id, parseInt(rowBelow.dataset.id));
  }

  drag = null;
}

// ── 重排 ──
function reorderTasks(fromId, toId) {
  var activeTasks = tasks.filter(function(t) { return !t.completed; });
  var completedTasks = tasks.filter(function(t) { return t.completed; });

  var fromIdx = activeTasks.findIndex(function(t) { return t.id === fromId; });
  var toIdx = activeTasks.findIndex(function(t) { return t.id === toId; });
  if (fromIdx === -1 || toIdx === -1) return;

  var moved = activeTasks.splice(fromIdx, 1)[0];
  activeTasks.splice(toIdx, 0, moved);

  tasks = activeTasks.concat(completedTasks);
  save();
  renderAll();
}

// ── 首次触摸时显示长按提示 ──
var hintShown = false;
document.getElementById('activeList').addEventListener('touchstart', function() {
  if (hintShown) return;
  hintShown = true;
  var hint = document.createElement('div');
  hint.className = 'longpress-hint';
  hint.textContent = '💡 长按任务可拖拽排序';
  document.body.appendChild(hint);
  setTimeout(function() { hint.remove(); }, 2200);
}, { once: true });

// ========== 导出 / 导入 ==========
function exportTasks() {
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '任务备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importTasks() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      if (!confirm(`即将导入 ${data.length} 条任务，当前任务会被覆盖。确定继续？`)) return;
      tasks = data;
      save();
      renderAll();
    } catch(err) {
      alert('文件格式错误，请选择正确的备份文件');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== 键盘 ==========
document.getElementById('taskInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTask();
  }
});

// ========== 初始化 ==========
load();
renderAll();

// 首次使用，放两条示例
if (tasks.length === 0) {
  tasks.push(
    { id: Date.now(),       text: '👋 欢迎使用任务看板！鼠标拖拽或长按可排序', completed: false, createdAt: Date.now(), completedAt: null },
    { id: Date.now() + 100, text: '📝 这是一个示例任务，右边的 ✕ 可删除',     completed: false, createdAt: Date.now(), completedAt: null }
  );
  save();
  renderAll();
}
</script>

<script>
// ========== PWA 安装 & 更新检测 ==========

function showUpdateBanner(sw) {
  var banner = document.getElementById('updateBanner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'updateBanner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;' +
      'background:#ffb74d;color:#fff;padding:12px 16px;text-align:center;' +
      'font-size:14px;font-weight:600;cursor:pointer;' +
      'animation:slideDown 0.35s ease;box-shadow:0 2px 12px rgba(0,0,0,0.15);';
    banner.onclick = function() {
      if (sw && sw.waiting) {
        sw.waiting.postMessage({ type: 'skip-waiting' });
      }
      window.location.reload();
    };
    document.body.appendChild(banner);
  }
  banner.textContent = '🔄 新版本已就绪 · 点此刷新';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'sw-updated') {
      showUpdateBanner();
    }
  });

  navigator.serviceWorker.register('/taskboard/sw.js').then(function(reg) {
    if (reg.waiting) {
      showUpdateBanner(reg);
    }
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', function() {
        if (this.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(reg);
        }
      });
    });
  });

  setInterval(function() {
    navigator.serviceWorker.getRegistration().then(function(reg) {
      if (reg) reg.update();
    });
  }, 30 * 60 * 1000);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    window.location.reload();
  });
}

var __pwaPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  __pwaPrompt = e;
  var el = document.getElementById('installBoxText');
  if (el) el.textContent = '📲 点这里一键安装到桌面';
});

function installOrGuide() {
  if (__pwaPrompt) {
    __pwaPrompt.prompt();
    __pwaPrompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') {
        document.getElementById('installBox').style.display = 'none';
      }
    });
  } else {
    alert('请点浏览器右上角 ⋮ 或 ≡ →「添加到主屏幕」\n\n如果菜单里没有，请下拉刷新页面后再试。');
  }
}
</script>
