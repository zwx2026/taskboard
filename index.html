<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA: 添加到手机桌面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="任务看板">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<link rel="apple-touch-icon" href="/taskboard/icon-192.png">
<link rel="manifest" href="/taskboard/manifest.json">
<title>📋 任务看板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: #f5f0e8;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,217,102,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(129,199,132,0.12) 0%, transparent 50%);
    padding: 30px 20px;
  }

  /* ── 顶部 ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    color: #4a4a4a;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .add-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .add-bar input {
    width: 420px;
    max-width: 80vw;
    padding: 12px 18px;
    font-size: 16px;
    border: 2px solid #e0d8cc;
    border-radius: 12px;
    outline: none;
    background: #fffef9;
    transition: border 0.2s;
    font-family: inherit;
  }
  .add-bar input:focus {
    border-color: #ffb74d;
    box-shadow: 0 0 0 4px rgba(255,183,77,0.12);
  }
  .add-bar button {
    padding: 12px 26px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #ffb74d;
    color: #fff;
    transition: all 0.2s;
    font-family: inherit;
  }
  .add-bar button:hover {
    background: #ffa726;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255,167,38,0.3);
  }

  /* ── 双栏布局 ── */
  .board {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
    align-items: flex-start;
  }

  @media (max-width: 750px) {
    .board {
      flex-direction: column;
      align-items: stretch;
    }
  }

  /* ── 便签面板 ── */
  .panel {
    flex: 1;
    min-width: 280px;
    border-radius: 6px 6px 16px 6px;
    box-shadow: 4px 5px 20px rgba(0,0,0,0.1), 1px 1px 3px rgba(0,0,0,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }

  .panel-head {
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .count {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.7;
  }

  /* 待完成 — 暖黄调 */
  .panel-active {
    background: #fffef7;
    border: 1px solid #ede7d5;
  }
  .panel-active .panel-head {
    background: #fff8e1;
    color: #6d5b2e;
    border-bottom: 1px solid #f0e4c6;
  }

  /* 已完成 — 浅绿调 */
  .panel-done {
    background: #fafff7;
    border: 1px solid #dce8d5;
  }
  .panel-done .panel-head {
    background: #e8f5e9;
    color: #3e5c3a;
    border-bottom: 1px solid #d0e2cc;
  }

  .panel-body {
    padding: 12px 14px;
    flex: 1;
    min-height: 200px;
  }

  /* ── 空状态 ── */
  .empty-hint {
    text-align: center;
    color: #ccc;
    padding: 40px 10px;
    font-size: 14px;
    user-select: none;
  }

  /* ── 任务行 ── */
  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    transition: all 0.25s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-row:hover {
    background: rgba(255,255,255,0.95);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .task-num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f5f0e8;
    color: #999;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    color: #444;
    line-height: 1.5;
    word-break: break-word;
  }
  .panel-done .task-text {
    text-decoration: line-through;
    color: #aaa;
  }

  /* 按钮 */
  .task-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: #fff;
  }

  .btn-done {
    color: #bbb;
    border-color: #e0d8cc;
  }
  .btn-done:hover {
    background: #43a047;
    color: #fff;
    border-color: #43a047;
    transform: scale(1.08);
    box-shadow: 0 3px 10px rgba(67,160,71,0.3);
  }

  .btn-restore {
    color: #bbb;
    border-color: #e0d8cc;
  }
  .btn-restore:hover {
    background: #ffb74d;
    color: #fff;
    border-color: #ffb74d;
    transform: scale(1.08);
    box-shadow: 0 3px 10px rgba(255,183,77,0.3);
  }

  .btn-delete {
    color: #bbb;
    border-color: transparent;
    font-size: 14px;
  }
  .btn-delete:hover {
    background: #ef5350;
    color: #fff;
    border-color: #ef5350;
    transform: scale(1.08);
  }

  /* ── 拖拽排序 ── */
  .task-row[draggable="true"] {
    cursor: grab;
    user-select: none;
  }
  .task-row[draggable="true"]:active {
    cursor: grabbing;
  }
  .task-row.dragging {
    opacity: 0.35;
    transition: opacity 0.15s;
  }
  .task-row.drag-over {
    border: 2px dashed #ffb74d;
    background: rgba(255,183,77,0.1);
    transform: scale(1.02);
  }
  .drag-clone {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.92;
    transform: rotate(2.5deg) scale(1.04);
    box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    border-radius: 10px;
    background: #fffef7;
  }
  .longpress-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 9998;
    animation: fadeInOut 2s ease forwards;
    pointer-events: none;
  }
  @keyframes fadeInOut {
    0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes slideDown {
    from { transform: translateY(-100%); }
    to   { transform: translateY(0); }
  }

  /* ── 底部工具栏 ── */
  .footer-bar {
    text-align: center;
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .footer-bar button {
    padding: 10px 20px;
    font-size: 13px;
    border-radius: 20px;
    border: 1px solid #ddd;
    cursor: pointer;
    background: #fff;
    color: #888;
    transition: all 0.2s;
    font-family: inherit;
  }
  .footer-bar button:hover {
    background: #fafafa;
    color: #555;
    border-color: #bbb;
  }
  .footer-bar .btn-danger:hover {
    background: #fff5f5;
    color: #ef5350;
    border-color: #ef5350;
  }

  /* ── 进度条 ── */
  .progress-wrap {
    max-width: 1100px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 4px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #e8e0d5;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #66bb6a;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    color: #999;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 任务看板</h1>
  <!-- 安装到桌面按钮 -->
  <div id="installBox" style="margin-top:12px;display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:20px;padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;font-size:14px;color:#555;" onclick="installOrGuide()">
    <span style="font-size:18px;">📲</span>
    <span id="installBoxText">添加到手机桌面</span>
  </div>
  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="输入新任务，按 Enter 添加…" maxlength="200">
    <button onclick="addTask()">＋ 添加</button>
  </div>
</div>

<div class="progress-wrap" id="progressArea">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-label" id="progressLabel">0/0</span>
</div>

<div class="board">
  <!-- 待完成 -->
  <div class="panel panel-active">
    <div class="panel-head">📝 待完成 <span class="count" id="activeCount">0</span></div>
    <div class="panel-body" id="activeList"></div>
  </div>

  <!-- 已完成 -->
  <div class="panel panel-done">
    <div class="panel-head">✅ 已完成 <span class="count" id="doneCount">0</span></div>
    <div class="panel-body" id="doneList"></div>
  </div>
</div>

<div class="footer-bar">
  <button onclick="exportTasks()">📥 导出备份</button>
  <button onclick="importTasks()">📤 导入恢复</button>
  <button class="btn-danger" onclick="clearDone()">🗑 清空已完成</button>
  <button class="btn-danger" onclick="clearAllTasks()">⚠ 全部清空</button>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const STORAGE_KEY = 'task_board_v2';

let tasks = [];

// ========== 存储 ==========
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tasks = JSON.parse(raw);
  } catch(e) { tasks = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ========== 渲染 ==========
function renderAll() {
  const active = tasks.filter(t => !t.completed);
  const done   = tasks.filter(t =>  t.completed);

  // 待完成列表
  const activeList = document.getElementById('activeList');
  if (active.length === 0) {
    activeList.innerHTML = '<div class="empty-hint">✨ 还没有任务<br>在上方输入框写下第一个任务吧</div>';
  } else {
    activeList.innerHTML = active.map((t, i) => `
      <div class="task-row" data-id="${t.id}" draggable="true"
           ondragstart="dragStart(event,this)" ondragend="dragEnd(event,this)"
           ondragover="dragOver(event,this)" ondragleave="dragLeave(event,this)"
           ondrop="drop(event,this)"
           ontouchstart="touchStart(event,this)" ontouchmove="touchMove(event,this)"
           ontouchend="touchEnd(event,this)">
        <span class="task-num">${i + 1}</span>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <button class="task-btn btn-done" title="标记完成" onclick="completeTask(${t.id})">✓</button>
        <button class="task-btn btn-delete" title="删除任务" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // 已完成列表
  const doneList = document.getElementById('doneList');
  if (done.length === 0) {
    doneList.innerHTML = '<div class="empty-hint">📭 还没有已完成的任务</div>';
  } else {
    doneList.innerHTML = done.map(t => `
      <div class="task-row" data-id="${t.id}">
        <span class="task-num" style="background:#e8f5e9;color:#81c784;">✓</span>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <button class="task-btn btn-restore" title="恢复任务" onclick="restoreTask(${t.id})">↩</button>
        <button class="task-btn btn-delete" title="删除" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // 计数
  document.getElementById('activeCount').textContent = active.length;
  document.getElementById('doneCount').textContent = done.length;

  // 进度条
  const total = tasks.length;
  const pct = total === 0 ? 0 : Math.round((done.length / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done.length}/${total} · ${pct}%`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 操作 ==========
function addTask(text) {
  if (!text) {
    text = document.getElementById('taskInput').value.trim();
  }
  if (!text) {
    document.getElementById('taskInput').focus();
    return;
  }

  tasks.push({
    id: Date.now(),
    text: text,
    completed: false,
    createdAt: Date.now(),
    completedAt: null
  });

  document.getElementById('taskInput').value = '';
  document.getElementById('taskInput').focus();
  save();
  renderAll();
}

function completeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = true;
  task.completedAt = Date.now();
  save();
  renderAll();
}

function restoreTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = false;
  task.completedAt = null;
  save();
  renderAll();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderAll();
}

function clearDone() {
  const done = tasks.filter(t => t.completed);
  if (done.length === 0) return;
  if (!confirm(`确定要删除全部 ${done.length} 条已完成任务吗？`)) return;
  tasks = tasks.filter(t => !t.completed);
  save();
  renderAll();
}

function clearAllTasks() {
  if (tasks.length === 0) return;
  if (!confirm(`确定要删除全部 ${tasks.length} 条任务吗？此操作不可恢复！`)) return;
  tasks = [];
  save();
  renderAll();
}

// ========== 拖拽排序 ==========
let dragSrcId = null;

function dragStart(e, el) {
  if (e.target.tagName === 'BUTTON') {
    e.preventDefault();
    return;
  }
  dragSrcId = parseInt(el.dataset.id);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
  setTimeout(() => el.classList.add('dragging'), 0);
}

function dragEnd(e, el) {
  el.classList.remove('dragging');
  document.querySelectorAll('.task-row.drag-over').forEach(row => row.classList.remove('drag-over'));
  dragSrcId = null;
}

function dragOver(e, el) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (el.dataset.id != dragSrcId) {
    el.classList.add('drag-over');
  }
}

function dragLeave(e, el) {
  el.classList.remove('drag-over');
}

function drop(e, el) {
  e.preventDefault();
  el.classList.remove('drag-over');
  const targetId = parseInt(el.dataset.id);
  if (dragSrcId && dragSrcId !== targetId) {
    reorderTasks(dragSrcId, targetId);
  }
  dragSrcId = null;
}

function reorderTasks(fromId, toId) {
  // 仅对待完成区生效：取出活跃任务按当前顺序排列
  const activeTasks = tasks.filter(t => !t.completed);
  const completedTasks = tasks.filter(t => t.completed);

  const fromIdx = activeTasks.findIndex(t => t.id === fromId);
  const toIdx = activeTasks.findIndex(t => t.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;

  // 移动
  const [moved] = activeTasks.splice(fromIdx, 1);
  activeTasks.splice(toIdx, 0, moved);

  // 重建：活跃任务新顺序 + 已完成任务保持不变
  tasks = [...activeTasks, ...completedTasks];
  save();
  renderAll();
}

// ── 移动端长按拖拽 ──
let longPressTimer = null;
let touchDragId = null;
let dragClone = null;
let cloneOffsetX = 0, cloneOffsetY = 0;
let touchStartX = 0, touchStartY = 0;
let hasMoved = false;
let hintShown = false;

function showLongpressHint() {
  if (hintShown) return;
  hintShown = true;
  const hint = document.createElement('div');
  hint.className = 'longpress-hint';
  hint.textContent = '💡 长按任务可拖拽排序';
  document.body.appendChild(hint);
  setTimeout(() => hint.remove(), 2200);
}

function touchStart(e, el) {
  if (e.target.tagName === 'BUTTON') return;
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  touchDragId = parseInt(el.dataset.id);
  hasMoved = false;

  const rect = el.getBoundingClientRect();
  cloneOffsetX = touch.clientX - rect.left;
  cloneOffsetY = touch.clientY - rect.top;

  longPressTimer = setTimeout(() => {
    // 创建浮动克隆
    dragClone = el.cloneNode(true);
    dragClone.classList.add('drag-clone');
    dragClone.style.width = el.offsetWidth + 'px';
    dragClone.style.left = (touch.clientX - cloneOffsetX) + 'px';
    dragClone.style.top = (touch.clientY - cloneOffsetY) + 'px';
    document.body.appendChild(dragClone);
    el.classList.add('dragging');
    hasMoved = true;
  }, 500);
}

function touchMove(e, el) {
  if (!hasMoved && longPressTimer) {
    const touch = e.touches[0];
    if (Math.abs(touch.clientX - touchStartX) > 8 || Math.abs(touch.clientY - touchStartY) > 8) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
  }

  if (dragClone) {
    e.preventDefault();
    const touch = e.touches[0];
    dragClone.style.left = (touch.clientX - cloneOffsetX) + 'px';
    dragClone.style.top = (touch.clientY - cloneOffsetY) + 'px';

    // 高亮下方目标行
    document.querySelectorAll('.task-row.drag-over').forEach(r => r.classList.remove('drag-over'));
    const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    const rowBelow = elemBelow ? elemBelow.closest('.task-row') : null;
    if (rowBelow && rowBelow.dataset.id && parseInt(rowBelow.dataset.id) !== touchDragId) {
      rowBelow.classList.add('drag-over');
    }
  }
}

function touchEnd(e, el) {
  clearTimeout(longPressTimer);
  longPressTimer = null;

  if (dragClone) {
    dragClone.remove();
    dragClone = null;

    el.classList.remove('dragging');
    document.querySelectorAll('.task-row.drag-over').forEach(r => r.classList.remove('drag-over'));

    const touch = e.changedTouches[0];
    const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    const rowBelow = elemBelow ? elemBelow.closest('.task-row') : null;

    if (rowBelow && rowBelow.dataset.id && parseInt(rowBelow.dataset.id) !== touchDragId) {
      reorderTasks(touchDragId, parseInt(rowBelow.dataset.id));
    }

    touchDragId = null;
    return;
  }

  // 不是拖拽（没有触发长按），啥也不做（正常 tap）
  touchDragId = null;
}

// 首次触摸活跃列表时显示长按提示（仅一次）
document.getElementById('activeList').addEventListener('touchstart', showLongpressHint, { once: true });

// ========== 导出 / 导入 ==========
function exportTasks() {
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '任务备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importTasks() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      if (!confirm(`即将导入 ${data.length} 条任务，当前任务会被覆盖。确定继续？`)) return;
      tasks = data;
      save();
      renderAll();
    } catch(err) {
      alert('文件格式错误，请选择正确的备份文件');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== 键盘 ==========
document.getElementById('taskInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTask();
  }
});

// ========== 初始化 ==========
load();
renderAll();

// 首次使用，放两条示例
if (tasks.length === 0) {
  tasks.push(

<script>
// ========== PWA 安装 & 更新检测 ==========

// 更新提示条
function showUpdateBanner(sw) {
  var banner = document.getElementById('updateBanner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'updateBanner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;' +
      'background:#ffb74d;color:#fff;padding:12px 16px;text-align:center;' +
      'font-size:14px;font-weight:600;cursor:pointer;' +
      'animation:slideDown 0.35s ease;box-shadow:0 2px 12px rgba(0,0,0,0.15);';
    banner.onclick = function() {
      // 告诉 SW 跳过等待并刷新
      if (sw && sw.waiting) {
        sw.waiting.postMessage({ type: 'skip-waiting' });
      }
      window.location.reload();
    };
    document.body.appendChild(banner);
  }
  banner.textContent = '🔄 新版本已就绪 · 点此刷新';
}

// 监听 SW 发来的更新消息
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'sw-updated') {
      showUpdateBanner();
    }
  });

  navigator.serviceWorker.register('/taskboard/sw.js').then(function(reg) {
    // 如果 SW 已经在等待，直接提示
    if (reg.waiting) {
      showUpdateBanner(reg);
    }

    // 检测到新的 SW 正在安装
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', function() {
        if (this.state === 'installed' && navigator.serviceWorker.controller) {
          // 新 SW 已就绪，显示更新提示
          showUpdateBanner(reg);
        }
      });
    });
  });

  // 定期检查更新（每 30 分钟）
  setInterval(function() {
    navigator.serviceWorker.getRegistration().then(function(reg) {
      if (reg) reg.update();
    });
  }, 30 * 60 * 1000);
}

// 监听 SW 跳过等待（从 banner 点击触发）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    window.location.reload();
  });
}

// 让 sw.js 中 skipWaiting 的 message 生效
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'skip-waiting') {
      // 已在 controllerchange 中处理 reload
    }
  });
}

var __pwaPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  __pwaPrompt = e;
  var el = document.getElementById('installBoxText');
  if (el) el.textContent = '📲 点这里一键安装到桌面';
});

function installOrGuide() {
  if (__pwaPrompt) {
    __pwaPrompt.prompt();
    __pwaPrompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') {
        document.getElementById('installBox').style.display = 'none';
      }
    });
  } else {
    alert('请点浏览器右上角 ⋮ 或 ≡ →「添加到主屏幕」\n\n如果菜单里没有，请下拉刷新页面后再试。');
  }
}
</script>
